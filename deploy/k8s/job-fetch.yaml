# geo-fetch — populates S3 object storage with normalized GeoJSON, reproducibly.
#
# Uses the same image as geo-api (gdal-bin is present, so bulk vector formats
# ingest via ogr2ogr/ogrinfo). Writes to s3://sentropic-geo/normalized (ADR-0012);
# the geo-api Deployment reads the same bucket via the StoreProvider. No PVC: an
# emptyDir holds only the transient download cache + GDAL scratch.
#
# `geo fetch` takes one dataset per call, so the three Québec SDA datasets are
# fetched in sequence. Re-run this Job to (re)populate or refresh the served data.
#
#   kubectl -n geo apply -f deploy/k8s/job-fetch.yaml
#   kubectl -n geo wait --for=condition=complete job/geo-fetch --timeout=20m
# To re-run, delete the completed Job first (`kubectl -n geo delete job geo-fetch`).
apiVersion: batch/v1
kind: Job
metadata:
  name: geo-fetch
  namespace: geo
  labels:
    app.kubernetes.io/name: geo-fetch
    app.kubernetes.io/part-of: geo
    app.kubernetes.io/component: data-population
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geo-fetch
        app.kubernetes.io/part-of: geo
        app.kubernetes.io/component: data-population
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: geo-registry-pull
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: geo-fetch
          image: rg.fr-par.scw.cloud/sentropic-geo/geo-api:0.1.4
          imagePullPolicy: IfNotPresent
          workingDir: /scratch
          # S3 connection (S3_ENDPOINT/S3_REGION/S3_ACCESS_KEY/S3_SECRET_KEY/S3_BUCKET).
          envFrom:
            - secretRef:
                name: geo-s3-credentials
          # `geo` is on PATH (symlinked to packages/geo/dist/cli/cli.js).
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              OUT=s3://sentropic-geo/normalized
              echo "Fetching Québec SDA boundaries into $OUT"
              geo fetch ca-qc/sda qc-regions       --out "$OUT"
              geo fetch ca-qc/sda qc-mrc           --out "$OUT"
              geo fetch ca-qc/sda qc-municipalites --out "$OUT"
              echo "geo-fetch complete"
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              # gdal/ogr2ogr can spike on the larger municipal layer; give it room.
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: scratch
              mountPath: /scratch
      volumes:
        # Ephemeral download cache + GDAL extraction scratch (raw archives, never
        # persisted; normalized output goes straight to S3).
        - name: scratch
          emptyDir:
            sizeLimit: 2Gi
---
# Optional periodic refresh of the served data (ADR-0004 cadence). Disabled by
# default (suspend: true) — enable by setting `suspend: false` once the one-shot
# geo-fetch Job has succeeded. Shares the same image + S3 target.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: geo-fetch
  namespace: geo
  labels:
    app.kubernetes.io/name: geo-fetch
    app.kubernetes.io/part-of: geo
    app.kubernetes.io/component: data-population
spec:
  # 04:17 on the 1st of each month (UTC). Adjust to taste.
  schedule: "17 4 1 * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: geo-fetch
            app.kubernetes.io/part-of: geo
            app.kubernetes.io/component: data-population
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: geo-registry-pull
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: geo-fetch
              image: rg.fr-par.scw.cloud/sentropic-geo/geo-api:0.1.4
              imagePullPolicy: IfNotPresent
              workingDir: /scratch
              envFrom:
                - secretRef:
                    name: geo-s3-credentials
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  OUT=s3://sentropic-geo/normalized
                  geo refresh --stale --out "$OUT" || \
                    { geo fetch ca-qc/sda qc-regions       --out "$OUT"; \
                      geo fetch ca-qc/sda qc-mrc           --out "$OUT"; \
                      geo fetch ca-qc/sda qc-municipalites --out "$OUT"; }
              resources:
                requests:
                  cpu: 100m
                  memory: 384Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: scratch
              emptyDir:
                sizeLimit: 2Gi
