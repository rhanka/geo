# geo-api Deployment — OGC API – Features server.
#
# Serves normalized GeoJSON directly from S3 object storage (Scaleway, bucket
# sentropic-geo) via the StoreProvider — no PVC needed (ADR-0012). The image
# is built and pushed by .github/workflows/docker-publish.yml. The `:latest` tag
# is a placeholder; pin a real tag (e.g. the release version) at deploy time,
# e.g. `kustomize edit set image` or `kubectl set image`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-api
  namespace: geo
  labels:
    app.kubernetes.io/name: geo-api
    app.kubernetes.io/part-of: geo
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geo-api
        app.kubernetes.io/part-of: geo
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: geo-registry-pull
      containers:
        - name: geo-api
          image: rg.fr-par.scw.cloud/sentropic-geo/geo-api:0.1.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            # StoreProvider indexes metadata first and lazy-loads GeoJSON per
            # collection, so the API can expose zones and qc-lots-* shards from
            # the full normalized prefix without loading every lot at startup.
            - name: GEO_DATA_URI
              value: s3://sentropic-geo/normalized
            - name: NODE_ENV
              value: production
          # S3 connection (Scaleway Object Storage) from the geo-s3-credentials
          # secret: S3_ENDPOINT / S3_REGION / S3_ACCESS_KEY / S3_SECRET_KEY / S3_BUCKET.
          envFrom:
            - secretRef:
                name: geo-s3-credentials
          # /conformance returns a static 200 regardless of data state, so it is
          # a safe liveness/readiness signal.
          readinessProbe:
            httpGet:
              path: /conformance
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /conformance
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 75m
              memory: 512Mi
            limits:
              # Lazy StoreProvider keeps startup light; per-request lot shards
              # still need room when large city collections are queried.
              cpu: 500m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      # No volume: data is read from S3 (sentropic-geo) by the StoreProvider.
