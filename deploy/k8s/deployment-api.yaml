# geo-api Deployment — OGC API – Features server.
#
# Serves normalized GeoJSON from the geo-data PVC (mounted read-only). The image
# is built and pushed by .github/workflows/docker-publish.yml. The `:latest` tag
# is a placeholder; pin a real tag (e.g. the release version) at deploy time,
# e.g. `kustomize edit set image` or `kubectl set image`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-api
  namespace: geo
  labels:
    app.kubernetes.io/name: geo-api
    app.kubernetes.io/part-of: geo
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geo-api
        app.kubernetes.io/part-of: geo
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: geo-api
          image: rg.fr-par.scw.cloud/geo/geo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: GEO_DATA_DIR
              value: /data/normalized
            - name: NODE_ENV
              value: production
          # /conformance returns a static 200 regardless of data state, so it is
          # a safe liveness/readiness signal.
          readinessProbe:
            httpGet:
              path: /conformance
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /conformance
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 75m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geo-data
            readOnly: true
